{% extends "base.html" %}
{% block title %}{{ service.title }}{% endblock %}
{% block content %}
<section class="container section narrow">
    <nav class="breadcrumbs"><a href="{{ url_for('public.index') }}">Главная</a> / <a href="{{ url_for('public.services') }}">Услуги</a> / {{ service.title }}</nav>
    <h1>{{ service.title }}</h1>
    <p class="lead">{{ service.short_description }}</p>
    <p>{{ service.full_description }}</p>
    <a class="button" href="{{ url_for('client.create_request_view') }}">Создать заявку</a>
</section>
{% endblock %}
