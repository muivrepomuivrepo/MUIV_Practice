{% extends "base.html" %}
{% block title %}Проекты{% endblock %}
{% block content %}
<section class="container section">
    <h1>Примеры проектных задач</h1>
    <div class="cards-grid">
        {% for project in projects %}
        <article class="card">
            <span class="badge">{{ project.city }}</span>
            <h3>{{ project.title }}</h3>
            <p>{{ project.description }}</p>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
