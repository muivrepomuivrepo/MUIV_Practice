{% extends "base.html" %}
{% block title %}Пользователи{% endblock %}
{% block content %}
<section class="container section">
    <h1>Пользователи</h1>
    <div class="table-card"><table><thead><tr><th>ФИО</th><th>Логин</th><th>Почта</th><th>Роль</th><th></th></tr></thead><tbody>{% for user in users %}<tr><td>{{ user.full_name }}</td><td>{{ user.username }}</td><td>{{ user.email }}</td><td>{{ user.role }}</td><td><form method="post" action="{{ url_for('admin.update_role', user_id=user.id) }}"><select name="role"><option value="client" {% if user.role=='client' %}selected{% endif %}>client</option><option value="manager" {% if user.role=='manager' %}selected{% endif %}>manager</option><option value="admin" {% if user.role=='admin' %}selected{% endif %}>admin</option></select><button class="small-button">Сохранить</button></form></td></tr>{% endfor %}</tbody></table></div>
</section>
{% endblock %}
